<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>座標獵人 - Coordinate Hunter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #1a1a2e;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        
        h1 {
            color: #ff6b35;
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 107, 53, 0.5);
        }
        
        .game-info {
            display: flex;
            gap: 40px;
            margin-bottom: 20px;
            font-size: 1.2rem;
        }
        
        .info-item {
            padding: 10px 20px;
            background: rgba(255, 107, 53, 0.2);
            border-radius: 8px;
            border: 2px solid #ff6b35;
        }
        
        .info-item span {
            color: #ff6b35;
            font-weight: bold;
        }
        
        .game-container {
            position: relative;
            margin: 20px 0;
        }
        
        canvas {
            background: #16213e;
            border: 3px solid #ff6b35;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(255, 107, 53, 0.3);
        }
        
        .input-area {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            align-items: center;
        }
        
        input {
            padding: 12px 20px;
            font-size: 1.1rem;
            background: #16213e;
            border: 2px solid #ff6b35;
            border-radius: 8px;
            color: #fff;
            width: 180px;
            text-align: center;
        }
        
        input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        
        button {
            padding: 12px 30px;
            font-size: 1.1rem;
            background: #ff6b35;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }
        
        button:hover {
            background: #ff8c5a;
            transform: scale(1.05);
        }
        
        button:disabled {
            background: #666;
            cursor: not-allowed;
            transform: none;
        }
        
        .message {
            margin-top: 15px;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 1.1rem;
            min-height: 45px;
        }
        
        .message.success {
            background: rgba(0, 255, 0, 0.2);
            color: #00ff00;
            border: 2px solid #00ff00;
        }
        
        .message.miss {
            background: rgba(255, 107, 53, 0.2);
            color: #ff6b35;
            border: 2px solid #ff6b35;
        }
        
        .result-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        
        .result-modal.show {
            display: flex;
        }
        
        .result-content {
            background: #16213e;
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            border: 3px solid #ff6b35;
        }
        
        .result-content h2 {
            color: #ff6b35;
            font-size: 2rem;
            margin-bottom: 20px;
        }
        
        .result-score {
            font-size: 4rem;
            color: #00ff00;
            margin: 20px 0;
        }
        
        .legend {
            margin-top: 20px;
            display: flex;
            gap: 20px;
            font-size: 0.9rem;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        
        .legend-dot.target {
            background: #ff6b35;
        }
        
        .legend-dot.found {
            background: #00ff00;
        }
        
        .legend-dot.wrong {
            background: #ff0000;
        }
    </style>
</head>
<body>
    <h1>🎯 座標獵人</h1>
    
    <div class="game-info">
        <div class="info-item">分數：<span id="score">0</span> / 10</div>
        <div class="info-item">倒數：<span id="timer">60</span> 秒</div>
        <div class="info-item">剩余：<span id="remaining">10</span> 個</div>
    </div>
    
    <div class="game-container">
        <canvas id="gameCanvas" width="440" height="440"></canvas>
    </div>
    
    <div class="legend">
        <div class="legend-item"><div class="legend-dot target"></div> 隱藏座標</div>
        <div class="legend-item"><div class="legend-dot found"></div> 命中</div>
        <div class="legend-item"><div class="legend-dot wrong"></div> 未命中</div>
    </div>
    
    <div class="input-area">
        <input type="text" id="guessInput" placeholder="輸入座標，如：2,-3" maxlength="10">
        <button id="submitBtn">猜！</button>
        <button id="restartBtn" style="background: #666;">重新開始</button>
    </div>
    
    <div class="message" id="message">在棋盤上找出隱藏的 10 個座標位置！</div>
    
    <div class="result-modal" id="resultModal">
        <div class="result-content">
            <h2 id="resultTitle">遊戲結束！</h2>
            <div class="result-score" id="finalScore">0 / 10</div>
            <p id="resultMessage">太棒了！</p>
            <button id="playAgainBtn" style="margin-top: 20px;">再玩一次</button>
        </div>
    </div>
    
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const input = document.getElementById('guessInput');
        const submitBtn = document.getElementById('submitBtn');
        const restartBtn = document.getElementById('restartBtn');
        const scoreEl = document.getElementById('score');
        const timerEl = document.getElementById('timer');
        const remainingEl = document.getElementById('remaining');
        const messageEl = document.getElementById('message');
        const resultModal = document.getElementById('resultModal');
        const playAgainBtn = document.getElementById('playAgainBtn');
        
        const GRID_SIZE = 11;
        const CELL_SIZE = 40;
        const OFFSET = CELL_SIZE / 2;
        
        let targets = [];
        let found = [];
        let wrong = [];
        let score = 0;
        let timeLeft = 60;
        let timerInterval = null;
        let gameActive = false;
        
        function generateTargets() {
            targets = [];
            while (targets.length < 10) {
                const x = Math.floor(Math.random() * 11) - 5;
                const y = Math.floor(Math.random() * 11) - 5;
                const key = `${x},${y}`;
                if (!targets.find(t => t.x === x && t.y === y)) {
                    targets.push({ x, y });
                }
            }
        }
        
        function drawGrid() {
            ctx.fillStyle = '#16213e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.lineWidth = 1;
            
            // 繪製格線
            for (let i = 0; i <= GRID_SIZE; i++) {
                ctx.beginPath();
                ctx.moveTo(i * CELL_SIZE, 0);
                ctx.lineTo(i * CELL_SIZE, canvas.height);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(0, i * CELL_SIZE);
                ctx.lineTo(canvas.width, i * CELL_SIZE);
                ctx.stroke();
            }
            
            // 繪製軸線
            ctx.strokeStyle = 'rgba(255, 107, 53, 0.8)';
            ctx.lineWidth = 2;
            
            // X 軸
            ctx.beginPath();
            ctx.moveTo(OFFSET + 5 * CELL_SIZE, 0);
            ctx.lineTo(OFFSET + 5 * CELL_SIZE, canvas.height);
            ctx.stroke();
            
            // Y 軸
            ctx.beginPath();
            ctx.moveTo(0, OFFSET + 5 * CELL_SIZE);
            ctx.lineTo(canvas.width, OFFSET + 5 * CELL_SIZE);
            ctx.stroke();
            
            // 繪製刻度數字
            ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
            ctx.font = '12px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            for (let i = 0; i < GRID_SIZE; i++) {
                const val = i - 5;
                // X 軸標籤
                ctx.fillText(val.toString(), OFFSET + i * CELL_SIZE, OFFSET + 5 * CELL_SIZE + 18);
                // Y 軸標籤
                ctx.fillText(val.toString(), OFFSET + 5 * CELL_SIZE + 18, OFFSET + (10 - i) * CELL_SIZE);
            }
        }
        
        function drawFound() {
            found.forEach(pos => {
                const px = OFFSET + (pos.x + 5) * CELL_SIZE;
                const py = OFFSET + (5 - pos.y) * CELL_SIZE;
                
                ctx.beginPath();
                ctx.arc(px, py, 12, 0, Math.PI * 2);
                ctx.fillStyle = '#00ff00';
                ctx.fill();
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 2;
                ctx.stroke();
            });
        }
        
        function drawWrong() {
            wrong.forEach(pos => {
                const px = OFFSET + (pos.x + 5) * CELL_SIZE;
                const py = OFFSET + (5 - pos.y) * CELL_SIZE;
                
                ctx.beginPath();
                ctx.arc(px, py, 8, 0, Math.PI * 2);
                ctx.fillStyle = '#ff0000';
                ctx.fill();
            });
        }
        
        function render() {
            drawGrid();
            drawWrong();
            drawFound();
        }
        
        function parseGuess(str) {
            const parts = str.trim().split(/[,\s]+/);
            if (parts.length !== 2) return null;
            
            const x = parseInt(parts[0]);
            const y = parseInt(parts[1]);
            
            if (isNaN(x) || isNaN(y)) return null;
            if (x < -5 || x > 5 || y < -5 || y > 5) return null;
            
            return { x, y };
        }
        
        function checkGuess(guess) {
            const target = targets.find(t => t.x === guess.x && t.y === guess.y);
            
            if (target) {
                if (!found.find(f => f.x === guess.x && f.y === guess.y)) {
                    found.push(guess);
                    score++;
                    scoreEl.textContent = score;
                    remainingEl.textContent = 10 - found.length;
                    messageEl.textContent = `🎯 命中！(${guess.x}, ${guess.y})`;
                    messageEl.className = 'message success';
                    
                    if (found.length === 10) {
                        endGame(true);
                    }
                } else {
                    messageEl.textContent = `這個座標已經找到了！`;
                    messageEl.className = 'message miss';
                }
            } else {
                if (!wrong.find(w => w.x === guess.x && w.y === guess.y)) {
                    wrong.push(guess);
                }
                messageEl.textContent = `💨 未命中！(${guess.x}, ${guess.y})`;
                messageEl.className = 'message miss';
            }
            
            render();
        }
        
        function startTimer() {
            timerInterval = setInterval(() => {
                timeLeft--;
                timerEl.textContent = timeLeft;
                
                if (timeLeft <= 10) {
                    timerEl.style.color = '#ff0000';
                }
                
                if (timeLeft <= 0) {
                    endGame(false);
                }
            }, 1000);
        }
        
        function endGame(completed) {
            gameActive = false;
            clearInterval(timerInterval);
            submitBtn.disabled = true;
            input.disabled = true;
            
            const modal = document.getElementById('resultModal');
            document.getElementById('resultTitle').textContent = completed ? '🎉 全部找到！' : '⏰ 時間到！';
            document.getElementById('finalScore').textContent = `${score} / 10`;
            document.getElementById('resultMessage').textContent = getResultMessage(score);
            modal.classList.add('show');
        }
        
        function getResultMessage(score) {
            if (score === 10) return '完美！你是座標大師！🌟';
            if (score >= 8) return '太棒了！實力堅強！💪';
            if (score >= 6) return '很不錯！繼續加油！👍';
            if (score >= 4) return '還有進步空間，多練習！📚';
            return '多加練習，你一定可以！💪';
        }
        
        function initGame() {
            targets = [];
            found = [];
            wrong = [];
            score = 0;
            timeLeft = 60;
            gameActive = true;
            
            scoreEl.textContent = '0';
            timerEl.textContent = '60';
            timerEl.style.color = '#ff6b35';
            remainingEl.textContent = '10';
            messageEl.textContent = '在棋盤上找出隱藏的 10 個座標位置！';
            messageEl.className = 'message';
            
            submitBtn.disabled = false;
            input.disabled = false;
            input.value = '';
            resultModal.classList.remove('show');
            
            generateTargets();
            render();
            
            if (timerInterval) clearInterval(timerInterval);
            startTimer();
            input.focus();
        }
        
        submitBtn.addEventListener('click', () => {
            if (!gameActive) return;
            
            const guess = parseGuess(input.value);
            if (!guess) {
                messageEl.textContent = '請輸入正確格式：x,y（例：2,-3）';
                messageEl.className = 'message miss';
                return;
            }
            
            checkGuess(guess);
            input.value = '';
            input.focus();
        });
        
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                submitBtn.click();
            }
        });
        
        restartBtn.addEventListener('click', initGame);
        playAgainBtn.addEventListener('click', initGame);
        
        // 初始化遊戲
        initGame();
    </script>
</body>
</html>
